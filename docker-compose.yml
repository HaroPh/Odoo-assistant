# ERP AI Assistant — CORE stack (Phase 1)
# Chỉ 3 service nền tảng chạy được NGAY hôm nay: postgres + ollama + litellm.
# backend / mcp-* / open-webui / monitoring sẽ được thêm khi build tới (xem TAD v1.1 §6).
#
# Bring-up:  docker compose up -d postgres ollama litellm
# Pull model: docker exec ollama ollama pull qwen3:8b
#
# NOTE pin version: các tag :latest/main-stable dưới đây là để bring-up DEV.
#   PIN trước production:  docker manifest inspect <image>:<tag>   (TAD v1.1 §3.6)

networks:
  ai_internal:
    driver: bridge
  ai_frontend:
    driver: bridge

volumes:
  ollama_models:
    driver: local
    driver_opts: { type: none, o: bind, device: "D:/ai-data/ollama" }
  postgres_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "D:/ai-data/postgres" }
  openwebui_data:

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    # Host 5433 (5432 đã bị PostgreSQL native của Odoo 19 chiếm).
    # Container/network vẫn dùng 5432 — production không đổi gì.
    ports: ["5433:5432"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ai_assistant
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [ai_internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest          # PIN trước prod
    container_name: ollama
    ports: ["11434:11434"]
    volumes:
      - ollama_models:/root/.ollama
    networks: [ai_internal]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      # --- Cấu hình cho 8GB VRAM (~6.6GB trống thực tế) ---
      OLLAMA_MAX_LOADED_MODELS: "1"      # chỉ giữ 1 model trong VRAM
      OLLAMA_NUM_PARALLEL: "1"           # xử lý tuần tự, không batch (tránh KV cache phình)
      OLLAMA_KEEP_ALIVE: "30m"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-stable   # PIN trước prod (vd v1.61.x-stable)
    container_name: litellm
    ports: ["4000:4000"]                 # API + Admin UI tại /ui
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/litellm"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      STORE_MODEL_IN_DB: "true"
    volumes:
      - ./monitoring/litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--detailed_debug"]
    networks: [ai_internal, ai_frontend]
    depends_on:
      postgres: { condition: service_healthy }
      ollama:   { condition: service_healthy }
    healthcheck:
      # image litellm KHÔNG có curl → dùng python stdlib
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ─── FRONTEND: Open WebUI ───────────────────────────────────────────────────
  # Nối vào backend (host) qua OpenAI-compatible API. Backend + mcp-odoo hiện chạy
  # trên HOST (dev) → dùng host.docker.internal. Khi Dockerize backend (bước C) sẽ
  # đổi OPENAI_API_BASE_URL sang http://backend:8000/v1.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main   # PIN trước prod
    container_name: open-webui
    ports: ["3000:8080"]
    environment:
      OPENAI_API_BASE_URL: "http://host.docker.internal:8000/v1"
      OPENAI_API_KEY: ${INTERNAL_API_KEY}
      ENABLE_OLLAMA_API: "false"        # chỉ hiện model erp-assistant từ backend
      WEBUI_AUTH: "false"               # dev: vào thẳng, không cần tạo account
      WEBUI_NAME: "ERP AI Assistant"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - openwebui_data:/app/backend/data
    networks: [ai_frontend]
    restart: unless-stopped

# ───────────────────────────────────────────────────────────────────────────
# THÊM SAU (placeholder — bỏ comment khi build tới phase tương ứng):
#   backend:        FastAPI — build: ./backend (bước C: Dockerize, hiện chạy host)
#   mcp-odoo:       Odoo MCP — build: ./mcp-servers/odoo (bước C, hiện chạy host)
#   mcp-sqlserver:  SQL Server MCP (Phase 1, ngày 9–10) — build: ./mcp-servers/sqlserver
#   qdrant + langfuse + prometheus + grafana: profile 'monitoring' (Phase 2)
# Cấu hình chi tiết: TAD v1.0 §11.2
