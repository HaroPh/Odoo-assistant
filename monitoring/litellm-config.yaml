# LiteLLM gateway — route tới Ollama. Agent/MCP gọi qua đây (OpenAI-compatible).
# Đổi runtime (Ollama→vLLM) chỉ cần sửa api_base, code Agent không đổi.

model_list:
  - model_name: qwen3:8b              # primary (~5.5GB) — 80% traffic
    litellm_params:
      model: ollama_chat/qwen3:8b     # ollama_chat = hỗ trợ chat + tool-calling
      api_base: http://ollama:11434
  - model_name: qwen3:4b              # fast (~3.5GB) — intent routing, câu ngắn
    litellm_params:
      model: ollama_chat/qwen3:4b
      api_base: http://ollama:11434
  - model_name: qwen2.5:7b            # fallback khi Qwen3 lỗi tool-call format
    litellm_params:
      model: ollama_chat/qwen2.5:7b
      api_base: http://ollama:11434

litellm_settings:
  drop_params: true                   # bỏ param model không hỗ trợ thay vì lỗi
  request_timeout: 120                 # giây — chặn treo vô hạn (TAD v1.1 §3.5)

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
